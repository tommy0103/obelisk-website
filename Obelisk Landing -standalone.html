  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Obelisk — Explicit memory infrastructure for coding agents<\u002Ftitle>\n\n\n\n\n\n\n\n<style>\n  :root {\n    --bg: #0a0b14;\n    --bg-lift: #0d0e18;\n    --edge: rgba(255,255,255,0.06);\n    --edge-hi: rgba(255,255,255,0.11);\n    --panel: rgba(255,255,255,0.025);\n    --fg: #f5f3ee;\n    --fg-soft: rgba(240,236,228,0.9);\n    --muted: rgba(200,195,184,0.6);\n    --faint: rgba(200,195,184,0.4);\n    --dim: rgba(200,195,184,0.3);\n    --accent: #c4b5fd;\n    --accent-deep: #a78bfa;\n    --pink: #ec4899;\n    --indigo: #6366f1;\n    --btn-fill: rgba(244,241,234,0.94);\n    --btn-ink: #171921;\n    --serif: 'Iowan Old Style','Charter','Georgia','Source Han Serif SC','Noto Serif CJK SC','Songti SC',serif;\n    --sans: -apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;\n    --mono: 'JetBrains Mono','IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; scroll-padding-top: 32px; }\n  body {\n    background: var(--bg); color: var(--fg); font-family: var(--sans);\n    font-size: 16px; line-height: 1.6;\n    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;\n    text-rendering: optimizeLegibility; overflow-x: hidden;\n  }\n  ::selection { background: rgba(167,139,250,0.28); color: #fff; }\n  a { color: inherit; text-decoration: none; }\n  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 40px; }\n  .kicker { font-family: var(--serif); font-style: italic; font-size: 15px; letter-spacing: 0; color: var(--accent); }\n\n  /* ============ NAV ============ */\n  nav {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 66px;\n    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);\n    background: rgba(10,11,20,0.5); border-bottom: 1px solid transparen -family: var(--serif); font-weight: 500; font-size: clamp(28px, 4vw, 44px); line-height: 1.24; letter-spacing: -0.01em; text-wrap: balance; max-width: 900px; margin: 0 auto 56px; text-align: center; }\n  .idea-statement .em { color: var(--accent); }\n  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; max-width: 900px; margin: 0 auto; }\n  .cmp { border: 1px solid var(--edge); border-radius: 16px; padding: 34px 30px; background: var(--panel); }\n  .cmp.old { opacity: 0.72; }\n  .cmp.new { border-color: rgba(167,139,250,0.28); background: rgba(167,139,250,0.05); position: relative; overflow: hidden; }\n  .cmp.new::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(167,139,250,0.6), transparent); }\n  .cmp .cmp-label { font-family: var(--serif); font-style: italic; font-size: 14px; letter-spacing: 0; margin-bottom: 14px; }\n  .cmp.old .cmp-label { color: var(--faint); }\n  .cmp.new .cmp-label { color: var(--accent); }\n  .cmp h3 { font-family: var(--serif); font-size: 22px; font-weight: 600; margin-bottom: 12px; line-height: 1.3; }\n  .cmp.old h3 { color: var(--muted); }\n  .cmp p { font-family: var(--serif); font-size: 16px; line-height: 1.66; color: var(--muted); }\n  @media (max-width: 720px) { .compare { grid-template-columns: 1fr; } }\n\n  /* ============ THREE LAYERS ============ */\n  .layers-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\n  .layer-card { border: 1px solid var(--edge); border-radius: 16px; padding: 32px 28px; background: var(--panel); position: relative; }\n  .layer-card.no { opacity: 0.6; }\n  .layer-card.yes { border-color: rgba(167,139,250,0.24); }\n  .layer-glyph { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; font-family: var(--mono); font-size: 18px; margin-bottom: 22px; }\n  .layer-card.no .layer-glyph { color: var(--faint); border: 1px solid var(--edge); }\n  .layer-card.yes .layer-glyph { color: var(--accent); background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.3); }\n  .layer-card h3 { font-family: var(--serif); font-size: 20px; font-weight: 600; margin-bottom: 12px; }\n  .layer-card.no h3 { color: var(--muted); }\n  .layer-card p { font-family: var(--serif); font-size: 15.5px; line-height: 1.62; color: var(--muted); }\n  .layers-foot { max-width: 720px; margin: 44px auto 0; padding: 26px 30px; border-left: 1px solid var(--accent); }\n  .layers-foot p { font-family: var(--serif); font-size: 17.5px; line-height: 1.7; color: var(--fg-soft); }\n  .layers-foot strong { color: var(--fg); font-weight: 600; }\n  @media (max-width: 820px) { .layers-grid { grid-template-columns: 1fr; } }\n\n  /* ============ IN PRACTICE ============ */\n  .practice-section { border-top: 1px solid var(--edge); }\n  .practice-grid { display: grid; grid-template-columns: minmax(0,1.35fr) minmax(300px,0.65fr); gap: 44px; align-items: start; }\n  .practice-terminal-wrap { min-width: 0; }\n  .practice-terminal {\n    --pt-bg: #2d2e3d;\n    --pt-bg-top: #292a38;\n    --pt-ink: #d9d8e4;\n    --pt-muted: #9da0b4;\n    --pt-claude: #e47aa2;\n    --pt-tool: #83a9fa;\n    --pt-success: #8bc7a5;\n    --pt-size: 11px;\n    --pt-leading: 1.5;\n    overflow: hidden;\n    color: var(--pt-ink);\n    border: 1px solid rgba(220,216,238,0.16);\n    border-radius: 12px;\n    background: var(--pt-bg);\n    box-shadow: 0 28px 80px -34px rgba(0,0,0,0.82);\n    font: var(--pt-size)/var(--pt-leading) var(--mono);\n    font-variant-ligatures: none;\n    letter-spacing: 0;\n  }\n  .practice-terminal-top { height: 42px; display: flex; align-items: center; gap: 8px; padding: 0 15px; border-bottom: 1px solid rgba(255,255,255,0.08); background: var(--pt-bg-top); }\n  .practice-terminal-traffic { width: 9px; height: 9px; flex: 0 0 auto; border-radius: 50%; background: rgba(255,255,255,0.15); }\n  .practice-terminal-title { margin-left: 7px; color: var(--pt-muted); font- ice-terminal-command-line { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }\n  .practice-terminal-command-line + .practice-terminal-command-line { padding-left: 14px; }\n  .practice-terminal-permission { margin-inline: -20px; padding: 14px 20px 12px; border-top: 1px solid rgba(255,255,255,0.17); border-bottom: 1px solid rgba(255,255,255,0.17); background: rgba(20,21,31,0.08); }\n  .practice-terminal-permission-title { margin-bottom: 10px; color: var(--pt-tool); font-weight: 650; }\n  .practice-terminal-permission-code { max-height: 192px; overflow: hidden; color: #c3c5d4; }\n  .practice-terminal-permission-code pre { margin: 0; overflow: hidden; font: inherit; white-space: pre; }\n  .practice-terminal-permission-intent { margin-top: 7px; color: #c3c5d4; }\n  .practice-terminal-permission-reason { margin-top: 11px; color: var(--pt-muted); }\n  .practice-terminal-permission-copy { margin: 11px 0 6px; color: var(--pt-muted); }\n  .practice-terminal-permission-choice strong { color: var(--accent); font-weight: 600; }\n  .practice-terminal-permission-footer { margin-top: 9px; color: #7f8295; }\n  .practice-terminal-warping { color: var(--pt-claude); }\n  .practice-terminal-warping span { color: var(--pt-muted); }\n  .practice-terminal-answer { color: #e2e1e9; }\n  .practice-terminal-answer strong { color: #eceaf2; font-weight: 600; }\n  .practice-terminal-answer-lead { margin-bottom: 10px; color: #f0eef5; }\n  .practice-terminal-answer p { margin: 0 0 8px; }\n  .practice-terminal-answer-section { margin: 11px 0 5px; color: #f0eef5; font-weight: 650; }\n  .practice-terminal-architecture { margin: 5px 0 9px; color: #c7c8d5; }\n  .practice-terminal-answer ol { margin: 5px 0 10px 20px; padding: 0; }\n  .practice-terminal-answer li { margin: 3px 0; }\n  .practice-terminal-table { display: grid; grid-template-columns: minmax(92px,0.42fr) minmax(0,1.58fr); margin: 7px 0 10px; border-top: 1px solid rgba(217,216,228,0.35); border-left: 1px solid class=\"hero\" id=\"top\">\n  <div class=\"hero-aurora\"><\u002Fdiv>\n  <div class=\"monolith\"><\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"hero-content\">\n      <h1>Your agent keeps forgetting.<br><span class=\"em\">It doesn't have to.<\u002Fspan><\u002Fh1>\n      <p class=\"lede\">Every fix, every decision, every dead end already lives in your session history. Obelisk lets your coding agent search it — and answer from what actually happened.<\u002Fp>\n      <div class=\"hero-actions\">\n        <a href=\"#install\" class=\"btn btn-primary\">Install Obelisk →<\u002Fa>\n        <a href=\"https://github.com/tommy0103/obelisk\" class=\"btn btn-ghost\">GitHub ↗<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main>\n\n<!-- ============ THE IDEA ============ -->\n<section class=\"idea-section\" id=\"idea\">\n  <div class=\"wrap\">\n    <div class=\"idea-statement reveal\">\n      Everyone noticed agents forget.<br><span class=\"em\">Almost no one noticed the history was the answer.<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"compare reveal\">\n      <div class=\"cmp old\">\n        <div class=\"cmp-label\">The instinct<\u002Fdiv>\n        <h3>Build memory<\u002Fh3>\n        <p>Vector stores. Auto-injected context. A broker that summarizes the past and whispers it back — layers quietly deciding what your agent should remember.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cmp new\">\n        <div class=\"cmp-label\">Obelisk<\u002Fdiv>\n        <h3>Query the history<\u002Fh3>\n        <p>The session history is already there, already structured. Your agent doesn't need invented memory — it needs a way to look things up, on demand, in its own loop.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WHAT IT IS — THREE LAYERS ============ -->\n<section id=\"layers\">\n  <div class=\"wrap\">\n    <div class=\"sec-head center reveal\">\n      <span class=\"kicker\">What it is<\u002Fspan>\n      <h2>Explicit memory infrastructure — not a black box.<\u002Fh2>\n      <p>There are three ways to give an agent memory. Obelisk deliberately does only the last two.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"layers-grid reveal\">\n      <div class=\"layer-card no\">\n        <div class=\"layer-glyph\">✕<\u002Fdiv>\n        <h3>Implicit memory<\u002Fh3>\n        <p>Context injected behind the scenes, silently shaping answers. Obelisk does not do this — you never lose sight of what the agent is working from.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"layer-card yes\">\n        <div class=\"layer-glyph\">✓<\u002Fdiv>\n        <h3>Queryable session memory<\u002Fh3>\n        <p>The agent queries real sessions, tool calls, subagents, and workflows on demand. It sees the actual detail — not a stranger's summary.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"layer-card yes\">\n        <div class=\"layer-glyph\">✓<\u002Fdiv>\n        <h3>Approved durable memory<\u002Fh3>\n        <p>Only conclusions you approve persist to disk. Auditable, revocable — never a hidden layer growing on its own.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"layers-foot reveal\">\n      <p>No third broker layer summarizing on the agent's behalf. That was deliberate — an outside summarizer loses the detail of the agent investigating its own problem. <strong>We spend a little context to keep agency, relevance, and evidence.<\u002Fstrong><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ IN PRACTICE ============ -->\n<section class=\"practice-section\" id=\"practice\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <span class=\"kicker\">In practice<\u002Fspan>\n      <h2>The questions you'd ask a teammate who was there.<\u002Fh2>\n      <p>Type <code>/obelisk<\u002Fcode> in any Claude Code session and ask in plain language. The agent finds the session, follows the evidence, and answers.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"practice-grid\">\n      <div class=\"practice-terminal-wrap reveal\">\n        <div class=\"practice-terminal\" id=\"practice-terminal\" aria-label=\"Privacy-safe Claude Code and Obelisk transcript\">\n          <div class=\"practice-terminal-top\">\n            <span class=\"practice-terminal-traffic\"><\u002Fspan><span class=\"practice-terminal-traffic\"><\u002Fspan><span class=\"practice-terminal-traffic\"><\u002Fspan>\n            <span class=\"practice-terminal-title\">Claude Code · demo-project<\u002Fspan>\n            <button class=\"practice-terminal-replay\" id=\"practice-terminal-replay\" type=\"button\" aria-label=\"Replay the terminal demo\">↻ Replay<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"practice-terminal-prompt\"><span class=\"practice-terminal-prompt-mark\">❯<\u002Fspan><span id=\"practice-prompt-text\">/obelisk catch me up on demo-project — recent progress, and your read on the project<\u002Fspan><\u002Fdiv>\n          <div class=\"practice-terminal-scroll\">\n            <div class=\"practice-terminal-event\" data-practice-stage-only=\"1,2,3,4\"><div class=\"practice-terminal-thought\">Thought for 9s<\u002Fdiv><\u002Fdiv>\n            <div class=\"practice-terminal-event\" data-practice-stage-only=\"1,2,3,4\"><div class=\"practice-terminal-narration\"><span class=\"practice-terminal-bullet\">●<\u002Fspan><span>Let me look at the demo-project history through Obelisk.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"practice-terminal-event\" data-practice-stage-only=\"2,3\">\n              <div>● Running 1 shell command…<\u002Fdiv>\n              <div class=\"practice-terminal-command-preview\">\n                <span class=\"practice-terminal-command-elbow\">└<\u002Fspan>\n                <span class=\"practice-terminal-command-body\">\n                  <span class=\"practice-terminal-command-line\">$ cat &gt; /tmp/q_overview.mjs &lt;&lt; 'EOF'<\u002Fspan>\n                  <span class=\"practice-terminal-command-line\">const map = overview({ limit: 8 });<\u002Fspan>\n                  <span class=\"practice-terminal-command-line\">return { orientation: map.current, prior_memories: memories(…), session_evidence: search(…) };<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"practice-terminal-event\" data-practice-stage-only=\"2\">\n              <div class=\"practice-terminal-permission\">\n                <div class=\"practice-terminal-permission-title\">Bash command<\u002Fdiv>\n                <div class=\"practice-terminal-permission-code\"><pre>cat &gt; /tmp/q_overview.mjs &lt;&lt; 'EOF'\nconst map = overview({ limit: 8 });\nconst project = map.current?.project?.project;\nconst topic = 'project architecture design progress';\nreturn {\n  orientation: map.current,\n  prior_memories: memories({ project, query: topic, limit: 8 }),\n  session_evidence: search('demo-project', { project, limit: 10 })\n};\nEOF\nobelisk --query /tmp/q_overview.mjs 2&gt;/dev/null | head -300<\u002Fpre><\u002Fdiv>\n                <div class=\"practice-terminal-permission-intent\">Query Obelisk for demo-project overview and recent activity<\u002Fdiv>\n                <div class=\"practice-terminal-permission-reason\">Contains shell syntax (file_redirect) that cannot be statically analyzed<\u002Fdiv>\n                <div class=\"practice-terminal-permission-copy\">Do you want to proceed?<\u002Fdiv>\n                <div class=\"practice-terminal-permission-choice\"><strong>❯ 1. Yes<\u002Fstrong><br>&nbsp;&nbsp;2. Yes, and always allow access to tmp/ from this project<br>&nbsp;&nbsp;3. No<\u002Fdiv>\n                <div class=\"practice-terminal-permission-footer\">Esc to cancel · Tab to amend · ctrl+e to explain<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"practice-terminal-event\" data-practice-stage-only=\"3\"><div class=\"practice-terminal-warping\">✶ Warping… <span>(30s · ↓ 1.1k tokens)<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"practice-terminal-event\" data-practice-stage-only=\"3\">\n              <div>● Running 5 shell commands…<\u002Fdiv>\n              <div class=\"practice-terminal-command-preview\">\n                <span class=\"practice-terminal-command-elbow\">└<\u002Fspan>\n                <span class=\"practice-terminal-command-body\">\n                  <span class=\"practice-terminal-command-line\">$ obelisk --query /tmp/q_topics.mjs 2&gt;/dev/null | head -400<\u002Fspan>\n                  <span class=\"practice-terminal-command-line\">$ obelisk --query /tmp/q_summaries.mjs 2&gt;/dev/null<\u002Fspan>\n                  <span class=\"practice-terminal-command-line\">$ git log --oneline -20 2&gt;/dev/null<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"practice-terminal-event\" data-practice-stage-only=\"4\"><div class=\"practice-terminal-thought\">Listed 2 directories, ran 9 shell commands<\u002Fdiv><\u002Fdiv>\n            <div class=\"practice-terminal-event\" data-practice-stage-only=\"4\">\n              <div class=\"practice-terminal-answer\">\n                <div class=\"practice-terminal-answer-lead\">● Now I have a comprehensive picture. Here's my understanding of demo-project:<\u002Fdiv>\n\n                <div class=\"practice-terminal-answer-section\">Project overview<\u002Fdiv>\n                <p>demo-project is the product built around Obelisk, an indexing, retrieval, and visualization system for Claude Code and Codex session history. It exposes two user-facing surfaces:<\u002Fp>\n                <ol>\n                  <li><strong>Obelisk Skill (CLI layer).<\u002Fstrong> It runs as a Claude Code skill and provides FTS5 full-text search, structured SQL queries, and a persistent memory layer, allowing agents to revisit session history when making decisions. A CI workflow publishes the readable skill artifact to the obelisk-skill repository.<\u002Fli>\n                  <li><strong>Electron App (desktop).<\u002Fstrong> Built with electron-vite, Vue 3, and vue-router, it provides session browsing, timeline visualization, tool-call rendering, and an activity contribution calendar.<\u002Fli>\n                <\u002Fol>\n\n                <div class=\"practice-terminal-answer-section\">Engineering architecture<\u002Fdiv>\n                <p>The project has completed a monorepo refactor:<\u002Fp>\n                <div class=\"practice-terminal-architecture\">packages/core/&nbsp; SQLite indexer, schema, query APIs<br>packages/cli/&nbsp;&nbsp; npm-distributable CLI runtime<br>app/&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Electron + Vue session and memory UI<br>skill-doc/&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; query patterns and evidence contract<\u002Fdiv>\n                <p>Core stack: SQLite + FTS5 indexing, a TypeScript workspace, electron-vite, and the Vue 3 Composition API.<\u002Fp>\n\n                <div class=\"practice-terminal-answer-section\">Recent progress (past 1–2 weeks)<\u002Fdiv>\n                <p>Recent session history and git log show a nine-stage engineering refactor, covering Phases 0 through 8:<\u002Fp>\n                <div class=\"practice-terminal-table\" role=\"table\" aria-label=\"Synthetic recent project progress\">\n                  <div class=\"practice-terminal-cell practice-terminal-table-head\">Stage<\u002Fdiv>\n                  <div class=\"practice-terminal-cell practice-terminal-table-head\">What changed<\u002Fdiv>\n                  <div class=\"practice-terminal-cell\"><strong>Phase 5<\u002Fstrong><\u002Fdiv>\n                  <div class=\"practice-terminal-cell\">The app moved to electron-vite and ESM, adopted the shared core, and removed its duplicate indexer.<\u002Fdiv>\n                  <div class=\"practice-terminal-cell\"><strong>Phase 6<\u002Fstrong><\u002Fdiv>\n                  <div class=\"practice-terminal-cell\">A readable skill artifact build was added.<\u002Fdiv>\n                  <div class=\"practice-terminal-cell\"><strong>Phase 7<\u002Fstrong><\u002Fdiv>\n                  <div class=\"practice-terminal-cell\">CI now publishes automatically to the obelisk-skill repository.<\u002Fdiv>\n                  <div class=\"practice-terminal-cell\"><strong>Phase 8<\u002Fstrong><\u002Fdiv>\n                  <div class=\"practice-terminal-cell\">The CLI was extracted into an independent npm package.<\u002Fdiv>\n                  <div class=\"practice-terminal-cell\"><strong>App polish<\u002Fstrong><\u002Fdiv>\n                  <div class=\"practice-terminal-cell\">Timeline virtualization, incremental live-session updates, and stable scroll anchoring.<\u002Fdiv>\n                  <div class=\"practice-terminal-cell\"><strong>Windows CI<\u002Fstrong><\u002Fdiv>\n                  <div class=\"practice-terminal-cell\">Node 22, Windows path handling, and shell startup issues were fixed.<\u002Fdiv>\n                  <div class=\"practice-terminal-cell\"><strong>Latest<\u002Fstrong><\u002Fdiv>\n                  <div class=\"practice-terminal-cell\">The Vue renderer migration finished, together with the contribution ledger activity calendar.<\u002Fdiv>\n                <\u002Fdiv>\n                <p>Recent bug fixing has focused on dynamic-height virtualization in the SessionDetail timeline, addressing scroll jumps, text overlap, and lost scroll momentum during live-session updates.<\u002Fp>\n\n                <div class=\"practice-terminal-answer-section\">Overall positioning<\u002Fdiv>\n                <p>At its core, demo-project is an “observability platform for AI working memory.” It helps people and agents revisit, search, and understand prior development sessions, creating durable context across conversations. The Skill layer serves agent recall; the App layer serves human browsing and insight.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"practice-terminal-input\">❯<\u002Fdiv>\n          <div class=\"practice-terminal-status\">\n            <span class=\"practice-terminal-model\">[Opus 4.6 (1M context)]<\u002Fspan> │ demo-project git:(main)<br>\n            <span class=\"practice-terminal-context\">Context <span class=\"practice-terminal-context-bar\"><i id=\"practice-context-fill\"><\u002Fi><\u002Fspan> <span id=\"practice-context-pct\">7%<\u002Fspan><\u002Fspan>\n            <span class=\"practice-terminal-manual\">manual mode on · ← for agents<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"scenario-list reveal\">\n        <div class=\"scenario active\" data-demo=\"01-progress\" role=\"button\" tabindex=\"0\">\n          <div class=\"scenario-q\"><span class=\"p\">/obelisk<\u002Fspan><span>catch me up on demo-project — and your read on it<\u002Fspan><\u002Fdiv>\n          <div class=\"scenario-a\">The universal “<em>so, where were we?<\u002Fem>”<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scenario\" data-demo=\"02-auth-bug\" role=\"button\" tabindex=\"0\">\n          <div class=\"scenario-q\"><span class=\"p\">/obelisk<\u002Fspan><span>which files did the last auth bug fix touch, and why?<\u002Fspan><\u002Fdiv>\n          <div class=\"scenario-a\">Finds the session, pulls the <em>real edits<\u002Fem>, explains the reasoning behind each one.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scenario\" data-demo=\"03-file-history\" role=\"button\" tabindex=\"0\">\n          <div class=\"scenario-q\"><span class=\"p\">/obelisk<\u002Fspan><span>which sessions kept modifying this file recently?<\u002Fspan><\u002Fdiv>\n          <div class=\"scenario-a\">Traces <em>every session<\u002Fem> that touched the path — so you're not rediscovering the same change.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scenario\" data-demo=\"04-abandoned\" role=\"button\" tabindex=\"0\">\n          <div class=\"scenario-q\"><span class=\"p\">/obelisk<\u002Fspan><span>why did we drop that approach back then?<\u002Fspan><\u002Fdiv>\n          <div class=\"scenario-a\">Surfaces <em>the moment<\u002Fem> the approach was dropped, and what led to abandoning it.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scenario\" data-demo=\"05-subagents\" role=\"button\" tabindex=\"0\">\n          <div class=\"scenario-q\"><span class=\"p\">/obelisk<\u002Fspan><span>what did each review subagent conclude?<\u002Fspan><\u002Fdiv>\n          <div class=\"scenario-a\">Opens the <em>per-agent<\u002Fem> transcripts and lays out what each one concluded.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"scenario\" data-demo=\"06-recap\" role=\"button\" tabindex=\"0\">\n          <div class=\"scenario-q\"><span class=\"p\">/obelisk<\u002Fspan><span>recap this week<\u002Fspan><\u002Fdiv>\n          <div class=\"scenario-a\">The lightest way to <em>clock out<\u002Fem> — the week leaves with you, as one small card.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ APP ============ -->\n<section class=\"app-section\" id=\"app\">\n  <div class=\"wrap\">\n    <div class=\"app-grid\">\n      <div class=\"app-copy reveal\">\n        <span class=\"kicker\">For you, too<\u002Fspan>\n        <h2>The agent queries it. You can browse it.<\u002Fh2>\n        <p>Obelisk indexes both Claude Code and Codex sessions into one place. An optional desktop app lets you browse the same history yourself — readable diffs, terminal output, weekly recaps.<\u002Fp>\n        <div class=\"app-feats\">\n          <div class=\"app-feat active\" data-view=\"sessions\" role=\"button\" tabindex=\"0\"><b>Sessions<\u002Fb><span>Search, project filtering, readable tool calls.<\u002Fspan><\u002Fdiv>\n          <div class=\"app-feat\" data-view=\"memory\" role=\"button\" tabindex=\"0\"><b>Memory<\u002Fb><span>The conclusions you approved, and their source.<\u002Fspan><\u002Fdiv>\n          <div class=\"app-feat\" data-view=\"activity\" role=\"button\" tabindex=\"0\"><b>Activity<\u002Fb><span>A heatmap of what you've been building.<\u002Fspan><\u002Fdiv>\n          <div class=\"app-feat\" data-view=\"recap\" role=\"button\" tabindex=\"0\"><b>Recap<\u002Fb><span>Shareable weekly cards on your work.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"app-frame reveal\">\n        <div class=\"scaler\" id=\"app-scaler\">\n          <svg class=\"app-mock\" width=\"1160\" height=\"662\" viewBox=\"0 0 1160 662\" role=\"img\" aria-label=\"Obelisk desktop app, four browsable views\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\">\n            <desc id=\"app-mock-desc\">A faithful, privacy-safe impression of the Obelisk desktop app. Interface labels remain readable while project names, session text, commands, and paths are replaced by abstract color bars.<\u002Fdesc>\n            <defs>\n              <linearGradient id=\"app-bg\" x1=\"580\" y1=\"32\" x2=\"580\" y2=\"662\" gradientUnits=\"userSpaceOnUse\">\n                <stop stop-color=\"#0A0B14\"><\u002Fstop>\n                <stop offset=\"1\" stop-color=\"#11131F\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <radialGradient id=\"app-pink-glow\" cx=\"0\" cy=\"0\" r=\"1\" gradientTransform=\"translate(1120 38) rotate(153) scale(560 390)\" gradientUnits=\"userSpaceOnUse\">\n                <stop stop-color=\"#EC4899\" stop-opacity=\".14\"><\u002Fstop>\n                <stop offset=\"1\" stop-color=\"#EC4899\" stop-opacity=\"0\"><\u002Fstop>\n              <\u002FradialGradient>\n              <radialGradient id=\"app-violet-glow\" cx=\"0\" cy=\"0\" r=\"1\" gradientTransform=\"translate(660 330) rotate(90) scale(340 520)\" gradientUnits=\"userSpaceOnUse\">\n                <stop stop-color=\"#A78BFA\" stop-opacity=\".12\"><\u002Fstop>\n                <stop offset=\"1\" stop-color=\"#A78BFA\" stop-op entById('app-scaler');\n    if (!frame || !scaler) return;\n    const s = frame.clientWidth / 1160;\n    scaler.style.transform = 'scale(' + s + ')';\n  }\n  window.addEventListener('resize', scaleAppMock);\n  window.addEventListener('load', scaleAppMock);\n  scaleAppMock();\n\n  // ===== hero starfield =====\n  (function () {\n    const hero = document.querySelector('.hero');\n    const before = hero && hero.querySelector('.monolith');\n    if (!hero || !before) return;\n    let seed = 12;\n    const rnd = () => (seed = (seed * 16807) % 2147483647) / 2147483647;\n    const frag = document.createDocumentFragment();\n    for (let i = 0; i < 12; i++) {\n      const s = document.createElement('i');\n      s.className = 'star';\n      const size = (0.7 + rnd() * 1.2).toFixed(2);\n      const bright = rnd();\n      s.style.cssText = 'width:' + size + 'px;height:' + size + 'px;top:' + (3 + rnd() * 62).toFixed(1) + '%;left:' + (2 + rnd() * 96).toFixed(1) + '%;'\n        + '--tw-dur:' + (6 + rnd() * 9).toFixed(1) + 's;--tw-delay:-' + (rnd() * 12).toFixed(1) + 's;'\n        + '--tw-min:' + (0.04 + bright * 0.12).toFixed(2) + ';--tw-max:' + (0.28 + bright * 0.45).toFixed(2) + ';';\n      if (bright > 0.84) s.classList.add('glow');\n      frag.appendChild(s);\n    }\n    hero.insertBefore(frag, before);\n  })();\n\n  // ===== app mock: 4-view prototype =====\n  const appMockSvg = document.querySelector('.app-mock');\n  if (appMockSvg) {\n    const titleCtx = document.getElementById('mock-title-context');\n    const titleBar = document.getElementById('mock-title-bar');\n    const viewTitle = { sessions: 'Sessions \\u00b7', memory: 'Memory', activity: 'Activity', recap: 'Recap' };\n    const appFeats = document.querySelectorAll('.app-feat[data-view]');\n    function setMockView(name) {\n      appMockSvg.querySelectorAll('.mock-view').forEach(g => g.classList.toggle('on', g.dataset.view === name));\n      appMockSvg.querySelectorAll('.mock-navitem').forEach(g => g.classList.toggle('on', g.dataset.view === name));\n      appFeats.forEach(f => f.classList.toggle('active', f.dataset.view === name));\n      titleCtx.textContent = viewTitle[name];\n      titleBar.style.opacity = name === 'sessions' ? 1 : 0;\n    }\n    appMockSvg.querySelectorAll('.mock-navitem').forEach(g => g.addEventListener('click', () => setMockView(g.dataset.view)));\n    appFeats.forEach(f => {\n      f.addEventListener('click', () => setMockView(f.dataset.view));\n      f.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setMockView(f.dataset.view); } });\n    });\n    const heat = document.getElementById('mock-heatmap');\n    if (heat) {\n      let seed = 42;\n      const rnd = () => (seed = (seed * 16807) % 2147483647) / 2147483647;\n      const fills = ['rgba(248,250,252,0.05)', 'rgba(99,102,241,0.3)', 'rgba(99,102,241,0.5)', 'rgba(139,92,246,0.7)', 'rgba(168,85,247,0.9)'];\n      let cells = '';\n      for (let c = 0; c < 53; c++) {\n        const busy = 0.35 + 0.4 * Math.pow(Math.sin(c / 6.5), 2);\n        for (let r = 0; r < 7; r++) {\n          if (c === 52 && r > 4) break;\n          const v = rnd();\n          const lvl = v > busy + 0.25 ? 0 : v > busy ? 1 : v > busy - 0.25 ? 2 : v > busy - 0.42 ? 3 : 4;\n          cells += '<rect x=\"' + c * 13 + '\" y=\"' + r * 13 + '\" width=\"11\" height=\"11\" rx=\"2\" fill=\"' + fills[lvl] + '\"/>';\n        }\n      }\n      const months = ['Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'];\n      months.forEach((m, i) => {\n        cells += '<text x=\"' + Math.round(i * 56.5 + 2) + '\" y=\"103\" font-size=\"9.5\" fill=\"rgba(248,250,252,0.28)\" style=\"font-family:Menlo,monospace\">' + m + '<\u002Ftext>';\n      });\n      heat.innerHTML = cells;\n    }\n  }\n\n  const practiceTerminal = document.getElementById('practice-terminal');\n  const practiceReplay = document.getElementById('practice-terminal-replay');\n  const practicePromptText = document.getElementById('practice-prompt-text');\n  const practiceScroll = practiceTerminal?.querySelector('.practice-terminal-scroll');\n  const practiceStageDelays = [900, 1500, 1900, 2100];\n  let practiceStage = 0;\n  let practiceTimer = null;\n  let practiceStarted = false;\n  let practiceInView = false;\n  let practiceObserver = null;\n  let practicePaused = false;\n  let practiceRemaining = 0;\n  let practiceStageStart = 0;\n  let practiceAutoPaused = false;\n\n  let practiceCtxBase = 7;\n  function updatePracticeContext() {\n    const grow = [0, 0, 0.8, 1.0, 1.2][Math.min(practiceStage, 4)];\n    const pct = practiceCtxBase + grow;\n    document.getElementById('practice-context-fill').style.width = pct + '%';\n    document.getElementById('practice-context-pct').textContent = pct.toFixed(1) + '%';\n  }\n\n  function setPracticeStage() {\n    updatePracticeContext();\n    practiceTerminal.querySelectorAll('[data-practice-stage-only]').forEach((element) => {\n      const stages = element.dataset.practiceStageOnly.split(',').map(Number);\n      element.classList.toggle('is-visible', stages.includes(practiceStage));\n    });\n  }\n\n  function updatePracticeBtn() {\n    if (practiceStage >= 4 || !practiceStarted) {\n      practiceReplay.textContent = '\\u21bb Replay';\n      practiceReplay.setAttribute('aria-label', 'Replay the terminal demo');\n    } else if (practicePaused) {\n      practiceReplay.textContent = '\\u25b6\\ufe0e Resume';\n      practiceReplay.setAttribute('aria-label', 'Resume the terminal demo');\n    } else {\n      practiceReplay.textContent = '\\u275a\\u275a Pause';\n      practiceReplay.setAttribute('aria-label', 'Pause the terminal demo');\n    }\n  }\n\n  function schedulePracticeStage(delayOverride) {\n    clearTimeout(practiceTimer);\n    if (practiceStage >= 4) { updatePracticeBtn(); return; }\n    const delay = delayOverride ?? (practiceStageDelays[practiceStage] || 1800);\n    practiceStageStart = Date.now();\n    practiceRemaining = delay;\n    practiceTimer = setTimeout(() => {\n      practiceStage += 1;\n      setPracticeStage();\n      schedulePracticeStage();\n    }, delay);\n    updatePracticeBtn();\n  }\n\n  function practiceButtonAction() {\n    if (!practiceStarted || practiceStage >= 4) { replayPracticeTerminal(); return; }\n    if (practicePaused) {\n      practicePaused = false;\n      schedulePracticeStage(practiceRemaining);\n    } else {\n      practicePaused = true;\n      clearTimeout(practiceTimer);\n      practiceRemaining = Math.max(120, practiceRemaining - (Date.now() - practiceStageStart));\n      updatePracticeBtn();\n    }\n  }\n\n  function replayPracticeTerminal() {\n    clearTimeout(practiceTimer);\n    practiceStarted = true;\n    practicePaused = false;\n    practiceAutoPaused = false;\n    document.removeEventListener('visibilitychange', startPracticeTerminalWhenVisible);\n    practiceStage = 0;\n    setPracticeStage();\n    schedulePracticeStage();\n  }\n\n  const practiceScenarios = Array.from(document.querySelectorAll('.scenario[data-demo]'));\n  const practiceDemoCache = practiceScroll ? { '01-progress': { prompt: practicePromptText.textContent, html: practiceScroll.innerHTML, context: 7 } } : {};\n  async function selectPracticeDemo(name) {\n    if (!practiceScroll) return;\n    practiceScenarios.forEach(s => s.classList.toggle('active', s.dataset.demo === name));\n    if (!practiceDemoCache[name]) {\n      try {\n        let root = document.querySelector('template[data-demo=\"' + name + '\"]')?.content?.querySelector('[data-prompt]');\n        if (!root) {\n          const res = await fetch((window.__resources && window.__resources['demo' + name.slice(0, 2)]) || ('demos/' + name + '.html'));\n          const doc = new DOMParser().parseFromString(await res.text(), 'text/html');\n          root = doc.querySelector('[data-prompt]');\n        }\n        practiceDemoCache[name] = { prompt: root.getAttribute('data-prompt'), html: root.innerHTML, context: parseFloat(root.getAttribute('data-context')) || 7 };\n      } catch (e) { return; }\n    }\n    const demo = practiceDemoCache[name];\n    practicePromptText.textContent = demo.prompt;\n    practiceScroll.innerHTML = demo.html;\n    practiceCtxBase = demo.context || 7;\n    replayPracticeTerminal();\n  }\n\n  function startPracticeTerminalWhenVisible() {\n    if (practiceStarted || !practiceInView || document.visibilityState !== 'visible') return;\n    practiceStarted = true;\n    document.removeEventListener('visibilitychange', startPracticeTerminalWhenVisible);\n    schedulePracticeStage();\n  }\n\n  if (practiceTerminal) {\n    setPracticeStage();\n    practiceObserver = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        practiceInView = entry.isIntersecting && entry.intersectionRatio >= 0.25;\n        startPracticeTerminalWhenVisible();\n        if (!practiceStarted || practiceStage >= 4 || practicePaused) return;\n        if (!entry.isIntersecting && !practiceAutoPaused) {\n          practiceAutoPaused = true;\n          clearTimeout(practiceTimer);\n          practiceRemaining = Math.max(120, practiceRemaining - (Date.now() - practiceStageStart));\n        } else if (entry.isIntersecting && practiceAutoPaused) {\n          practiceAutoPaused = false;\n          schedulePracticeStage(practiceRemaining);\n        }\n      });\n    }, { threshold: [0, 0.25], rootMargin: '0px 0px -30% 0px' });\n    practiceObserver.observe(practiceTerminal);\n    document.addEventListener('visibilitychange', startPracticeTerminalWhenVisible);\n    practiceReplay.addEventListener('click', practiceButtonAction);\n    practiceScenarios.forEach(s => {\n      s.addEventListener('click', () => selectPracticeDemo(s.dataset.demo));\n      s.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectPracticeDemo(s.dataset.demo); } });\n    });\n  }\n\n  const revObs = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); revObs.unobserve(e.target); } });\n  }, { threshold: 0.12 });\n  document.querySelectorAll('.reveal').forEach(el => revObs.observe(el));\n\n  function copyCmd(btn, text) {\n    navigator.clipboard.writeText(text).then(() => { const o = btn.textContent; btn.textContent = 'Copied'; setTimeout(() => btn.textContent = o, 1400); });\n  }\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
